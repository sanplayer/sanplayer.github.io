<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>SanPlayer Edge-to-Edge Test</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .screen {
      position: fixed;
      inset: 0;

      width: 100%;
      min-height: 100dvh;

      overflow: hidden;

      background:
        linear-gradient(
          180deg,
          #ff0055 0%,
          #111111 35%,
          #00aaff 100%
        );
    }

    /* Linhas de referência */

    .line-top,
    .line-bottom {
      position: fixed;
      left: 0;
      width: 100%;
      height: 6px;
      z-index: 50;
    }

    .line-top {
      top: 0;
      background: #00ff00;
    }

    .line-bottom {
      bottom: 0;
      background: #ffff00;
    }

    /* Cantos */

    .corner {
      position: fixed;
      width: 28px;
      height: 28px;
      z-index: 60;
    }

    .tl {
      top: 0;
      left: 0;
      background: red;
    }

    .tr {
      top: 0;
      right: 0;
      background: lime;
    }

    .bl {
      bottom: 0;
      left: 0;
      background: cyan;
    }

    .br {
      bottom: 0;
      right: 0;
      background: yellow;
    }

    /* Texto de debug */

    .debug-top {
      position: fixed;

      top: 0;
      left: 0;
      right: 0;

      z-index: 70;

      text-align: center;

      color: white;

      font-size: 18px;
      font-weight: bold;

      padding-top: 8px;

      text-shadow: 0 2px 10px rgba(0,0,0,.5);
    }

    .debug-bottom {
      position: fixed;

      left: 0;
      right: 0;
      bottom: 0;

      z-index: 70;

      text-align: center;

      color: white;

      font-size: 18px;
      font-weight: bold;

      padding-bottom: 8px;

      text-shadow: 0 2px 10px rgba(0,0,0,.5);
    }

    /* Overlay para leitura da status bar */

    .top-fade {
      position: fixed;

      top: 0;
      left: 0;
      right: 0;

      height: 120px;

      background:
        linear-gradient(
          to bottom,
          rgba(0,0,0,.45),
          transparent
        );

      pointer-events: none;

      z-index: 10;
    }

    .bottom-fade {
      position: fixed;

      bottom: 0;
      left: 0;
      right: 0;

      height: 120px;

      background:
        linear-gradient(
          to top,
          rgba(0,0,0,.45),
          transparent
        );

      pointer-events: none;

      z-index: 10;
    }
  </style>
</head>

<body>

  <div class="screen"></div>

  <div class="top-fade"></div>
  <div class="bottom-fade"></div>

  <div class="line-top"></div>
  <div class="line-bottom"></div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="debug-top">
    STATUS BAR TEST
  </div>

  <div class="debug-bottom">
    NAVIGATION BAR TEST
  </div>

</body>

</html>
