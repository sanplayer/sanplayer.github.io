<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Background Stage</title>
  <link rel="manifest" href="/manifest.json">
  <!-- Define a status bar transparente -->
  <meta name="theme-color" content="transparent">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      background: url('https://www.pixelstalk.net/wp-content/uploads/2016/07/Free-Desktop-1080p-HD-Wallpaper-Nature.jpg') no-repeat center center;
      background-size: cover;
      position: relative;
    }

    /* Ajuste para recortes/notches */
    .stage {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* Conteúdo opcional */
    .overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      font-size: 1.2rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="overlay">Imagem por baixo da status bar</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
