<!DOCTYPE html>
<html lang="pt-BR">
<head>

  <meta charset="UTF-8" />
<link
        rel="manifest"
        href="/manifest.json"
    />
  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1,
      viewport-fit=cover,
      user-scalable=no
    "
  />

  <title>Status Bar Test</title>

<style type="text/css">
/* RESET TOTAL */

*,
*::before,
*::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* REMOVE QUALQUER LIMITAÇÃO */

html,
body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

/*
|--------------------------------------------------------------------------
| ROOT VIEWPORT REAL
|--------------------------------------------------------------------------
|
| 100dvh evita problemas modernos do Chrome Android.
| position fixed elimina influência de containers.
| inset 0 força ocupação física total.
|
*/

.fullscreen-image {
    position: fixed;

    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    width: 100vw;
    height: 100dvh;

    z-index: 1;

    overflow: hidden;

    /*
    |--------------------------------------------------------------------------
    | IMAGEM DE TESTE
    |--------------------------------------------------------------------------
    |
    | Use uma imagem MUITO visível no topo:
    | ex:
    | - rosto
    | - texto
    | - linhas horizontais
    |
    */

    background-image: url("https://swall.teahub.io/photos/small/1-14411_2400x1350-4k-mountain-wallpaper-17-data-id-87852.jpg");

    background-size: cover;

    /*
    |--------------------------------------------------------------------------
    | IMPORTANTE
    |--------------------------------------------------------------------------
    |
    | center top ajuda a perceber
    | imediatamente se o topo foi cortado.
    |
    */

    background-position: center top;

    background-repeat: no-repeat;

    /*
    |--------------------------------------------------------------------------
    | TESTE CRÍTICO
    |--------------------------------------------------------------------------
    |
    | Isso força o elemento a continuar
    | por trás da status bar.
    |
    */

    transform: translateY(-30px);
}


</style>
</head>


<!-- SERVICE WORKER -->

    <script>

        if ('serviceWorker' in navigator) {

            window.addEventListener('load', async () => {

                try {

                    const registration =
                        await navigator.serviceWorker.register(
                            '/service-worker.js',
                            {
                                scope: '/'
                            }
                        );

                    console.log(
                        'SW registrado:',
                        registration.scope
                    );

                } catch (error) {

                    console.error(
                        'Erro ao registrar SW:',
                        error
                    );

                }

            });

        }

    </script>


<body>

  <div class="fullscreen-image"></div>

</body>
</html>
