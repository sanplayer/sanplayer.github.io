<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Edge Test</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .video-stage {
      position: fixed;
      inset: 0;

      width: 100%;
      height: 100dvh;

      overflow: hidden;

      background:
        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop')
        center center / cover no-repeat;
    }

    .overlay-top {
      position: fixed;

      top: 0;
      left: 0;
      right: 0;

      height: 140px;

      background: linear-gradient(
        to bottom,
        rgba(0,0,0,.55),
        transparent
      );

      pointer-events: none;

      z-index: 2;
    }

    .debug {
      position: fixed;

      top: calc(env(safe-area-inset-top) + 16px);
      left: 16px;

      z-index: 3;

      color: #fff;

      font-family: sans-serif;
      font-size: 18px;
      font-weight: 700;

      text-shadow: 0 2px 10px rgba(0,0,0,.45);
    }

    .corner {
      position: fixed;

      width: 22px;
      height: 22px;

      background: red;

      z-index: 5;
    }

    .tl {
      top: 0;
      left: 0;
    }

    .tr {
      top: 0;
      right: 0;
    }

    .bl {
      bottom: 0;
      left: 0;
    }

    .br {
      bottom: 0;
      right: 0;
    }
  </style>
</head>

<body>

  <div class="video-stage"></div>

  <div class="overlay-top"></div>

  <div class="debug">
    EDGE-TO-EDGE TEST
  </div>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

</body>

</html>
