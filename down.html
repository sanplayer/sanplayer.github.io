<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#000000">
	<title>Download</title>

	<style id="gate-styles">
    :root {
        --bg-gate: #000000;
        --bg-card: #0f0d12;
        --accent-fire: linear-gradient(135deg, #673AB7 0%, #9C27B0 100%);
        --text-main: #ffffff;
        --text-muted: #cbcbcb;
    }
    *{
    	margin: 0;
    	padding: 0;
    	box-sizing: border-box;
    }
    body{
    	
    	height: 100dvh;
    }
    #sanplayer-gate {
        position: fixed;
        height: 100dvh;
        top: 0; 
        left: 0;
        width: 100vw;
        background-color: var(--bg-gate);
        color: var(--text-main);
        z-index: 999999; /* Fica por cima de absolutamente tudo */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .gate-container {
        text-align: center;
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        margin-top: -60px;


    }
    .gate-icon-wrapper {
        width: 96px; height: 96px;
        background: var(--bg-card);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #9C27B0;
    }
    .gate-icon-wrapper svg { width: 64px; height: 64px; fill: url(#fire-grad-gate); }
    .gate-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    .gate-desc { color: var(--text-muted); font-size: 1.2rem; line-height: 1.5; }
    .gate-btn {
        background: var(--accent-fire);
        color: #fff;
        font-weight: 700;
        border: none;
        padding: 16px 32px;
        border-radius: 50px;
        font-size: 1rem;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        width: 100%;
        transition: transform 0.1s ease;
        cursor: pointer;
    }
    .gate-btn:active { transform: scale(0.98); }
    .gate-badge {
        background: rgba(255, 255, 255, 0.08);
        padding: 6px 12px;
        border-radius: 12px;
        font-size: 0.8rem;
        color: var(--text-muted);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
</style>
</head>

<body>
<script>
    (function() {
        // Verifica se a URL contém a assinatura do seu APK
        const isApk = window.location.hash === '#apk-client' || window.location.search.includes('from=apk');

        if (isApk) {
            // Se for o APK, removemos a hash para limpar a URL visualmente
            if(window.location.hash === '#apk-client') {
                history.replaceState("", document.title, window.location.pathname + window.location.search);
            }
            // Não faz nada e deixa o index.html carregar o San Player normalmente
        } else {
            // Se NÃO for o APK, injeta a interface de bloqueio assim que o body abrir
            document.documentElement.classList.add('gate-active');
            window.addEventListener('DOMContentLoaded', () => {
                const gateHTML = `
                    <div id="sanplayer-gate">
                        <div class="gate-container">
                            <div class="gate-icon-wrapper">
                                <svg viewBox="0 0 512 512">
                                    <defs>
                                        <linearGradient id="fire-grad-gate" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stop-color="#A238FF" />
                                            <stop offset="100%" stop-color="#A238FF" />
                                        </linearGradient>
                                    </defs>
                                    <path d="M481 274l0 8c-2,5 0,16 -13,34 -7,10 -15,13 -18,17 -9,9 -7,18 -6,27 1,18 -6,38 -19,50 -22,21 -41,16 -50,20 -16,5 -11,19 -33,37 -18,15 -45,18 -66,8 -6,-3 -11,-7 -19,-7 -8,0 -13,5 -19,7 -28,13 -57,4 -77,-19 -8,-10 -10,-22 -21,-26 -10,-3 -30,0 -50,-20 -8,-8 -15,-18 -18,-29 -6,-23 1,-30 -4,-41 -3,-6 -7,-9 -11,-12 -5,-4 -8,-7 -12,-12 -12,-14 -12,-31 -13,-33l0 -9c1,-3 1,-9 2,-13 3,-9 5,-13 10,-20 11,-16 4,-21 0,-35 -5,-18 -2,-40 10,-55 24,-30 40,-16 49,-35 2,-4 2,-8 3,-12 7,-29 32,-48 60,-47 14,0 18,4 25,5 18,3 18,-13 38,-23 14,-7 31,-9 46,-4 23,8 25,21 36,26 12,5 20,-4 38,-4 16,0 33,8 43,19 17,19 14,33 19,42 4,8 9,9 19,12 21,7 38,26 41,50 4,34 -18,39 -2,62 2,3 4,6 6,9 2,3 3,7 4,11 1,4 1,9 2,13zm-93 -21c-2,-7 -8,-12 -11,-16 -1,-2 -1,-2 -3,-3 -1,-1 -2,-2 -4,-4 -7,-8 -14,-13 -22,-20 -3,-2 -5,-4 -8,-6 -15,-10 -26,-18 -43,-27 -23,-13 -53,-26 -80,-32 -22,-5 -30,-5 -37,14 -16,47 -17,153 2,198 3,7 6,12 15,13 8,0 17,-2 24,-4 15,-4 28,-9 41,-14 13,-6 25,-12 37,-19 6,-3 12,-7 18,-10 12,-8 22,-15 33,-23 1,-1 2,-2 4,-3l8 -7c1,-1 2,-2 4,-3 4,-3 16,-16 20,-22 2,-3 4,-7 3,-11z"/>
                                </svg>
                            </div>
                            <h1 class="gate-title">Instale o San Player</h1>
                            <p class="gate-desc">Para garantir máxima performance, segundo plano estável e uma melhor experiência, utilize nosso app oficial.</p>
                            <button onclick="baixarAPK()" title="Baixar Instalador" class="gate-btn" download>
                                Baixar Aplicativo Oficial
                            </button>
                            <span class="gate-badge">Versão: v1.0.2.6</span>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('afterbegin', gateHTML);
                
                // Opcional: Para o app.js original de rodar e consumir processamento à toa
                if (window.SanPlayerApp && typeof window.SanPlayerApp.destroy === 'function') {
                    window.SanPlayerApp.destroy();
                }
            });
        }
    })();
</script>
</body>
</html>
