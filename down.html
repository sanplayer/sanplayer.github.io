<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#000000">
	<title>Download</title>

	<style id="gate-styles">
    :root {
        --bg-gate: #000000;
        --bg-card: #1f1f1f;
        --accent-fire: linear-gradient(135deg, #673AB7 0%, #9C27B0 100%);
        --text-main: #ffffff;
        --text-muted: #aaaaaa;
    }
    *{
    	margin: 0;
    	padding: 0;
    	box-sizing: border-box;
    }
    body{
    	padding: 20px;
    	height: 100dvh;
    }
    #sanplayer-gate {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background-color: var(--bg-gate);
        color: var(--text-main);
        z-index: 999999; /* Fica por cima de absolutamente tudo */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .gate-container {
        text-align: center;
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }
    .gate-icon-wrapper {
        width: 96px; height: 96px;
        background: var(--bg-card);
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #333;
    }
    .gate-icon-wrapper svg { width: 48px; height: 48px; fill: url(#fire-grad-gate); }
    .gate-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    .gate-desc { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; max-width: 290px; }
    .gate-btn {
        background: var(--accent-fire);
        color: #fff;
        font-weight: 700;
        border: none;
        padding: 16px 32px;
        border-radius: 50px;
        font-size: 1rem;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 15px #9C27B0;
        min-height: 52px;
        width: 100%;
        transition: transform 0.1s ease;
    }
    .gate-btn:active { transform: scale(0.98); }
    .gate-badge {
        background: rgba(255, 255, 255, 0.08);
        padding: 6px 12px;
        border-radius: 12px;
        font-size: 0.8rem;
        color: var(--text-muted);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }
</style>
</head>

<body>
<script>
    (function() {
        // Verifica se a URL contém a assinatura do seu APK
        const isApk = window.location.hash === '#apk-client' || window.location.search.includes('from=apk');

        if (isApk) {
            // Se for o APK, removemos a hash para limpar a URL visualmente
            if(window.location.hash === '#apk-client') {
                history.replaceState("", document.title, window.location.pathname + window.location.search);
            }
            // Não faz nada e deixa o index.html carregar o San Player normalmente
        } else {
            // Se NÃO for o APK, injeta a interface de bloqueio assim que o body abrir
            document.documentElement.classList.add('gate-active');
            window.addEventListener('DOMContentLoaded', () => {
                const gateHTML = `
                    <div id="sanplayer-gate">
                        <div class="gate-container">
                            <div class="gate-icon-wrapper">
                                <svg viewBox="0 0 24 24">
                                    <defs>
                                        <linearGradient id="fire-grad-gate" x1="0%" y1="0%" x2="100%" y2="100%">
                                            <stop offset="0%" stop-color="#ff3e3e" />
                                            <stop offset="100%" stop-color="#ffaa00" />
                                        </linearGradient>
                                    </defs>
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                                </svg>
                            </div>
                            <h1 class="gate-title">Instale o San Player</h1>
                            <p class="gate-desc">Para garantir máxima performance, segundo plano estável e uma experiência premium, utilize nosso app oficial.</p>
                            <button onclick="baixarAPK()" title="Baixar Instalador" class="gate-btn" download>
                                Baixar Aplicativo Oficial
                            </button>
                            <span class="gate-badge">Versão: v1.0.2.6</span>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('afterbegin', gateHTML);
                
                // Opcional: Para o app.js original de rodar e consumir processamento à toa
                if (window.SanPlayerApp && typeof window.SanPlayerApp.destroy === 'function') {
                    window.SanPlayerApp.destroy();
                }
            });
        }
    })();
</script>
</body>
</html>
